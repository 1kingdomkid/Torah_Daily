<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Torah Daily</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="card hero">
      <h1>Torah Daily</h1>
      <p>Weekly parashah and daily aliyah for today.</p>
      <div class="date" id="todayDate">Loading date...</div>
    </header>

    <section class="card">
      <h2>This Week</h2>
      <div id="weeklyStatus">Loading weekly portion...</div>
    </section>

    <section class="card">
      <h2>Daily Aliyah</h2>
      <div id="dailyStatus">Loading daily reading...</div>
    </section>

    <section class="card">
      <h2>Details</h2>
      <pre id="details">Waiting for data...</pre>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
