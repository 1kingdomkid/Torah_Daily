<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Torah Daily</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="card hero">
      <div class="badge">Torah Daily</div>
      <h1>Weekly Portion + Daily Aliyah</h1>
      <p>Built for quick access from GitHub Pages.</p>
      <div class="date" id="todayDate">Loading date...</div>
    </header>

    <section class="grid">
      <article class="card">
        <h2>Weekly Portion</h2>
        <div id="weeklyStatus">Loading...</div>
      </article>

      <article class="card">
        <h2>Daily Aliyah</h2>
        <div id="dailyStatus">Loading...</div>
      </article>
    </section>

    <section class="card">
      <h2>Raw Data</h2>
      <pre id="details">Loading...</pre>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
